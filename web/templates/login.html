<!doctype html><html lang="{{ language }}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LANaxy Login</title><link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}"></head><body class="login-body"><main class="login-card"><h1>LANaxy</h1><p>{{ "This interface is protected." if language == "en" else "Diese Oberfläche ist geschützt." }}</p>{% if error %}<div class="flash error">{{ error }}</div>{% endif %}<form method="post" class="login-form"><label><span>{{ t("system.username") }}</span><input name="username" required autofocus></label><label><span>{{ "Password" if language == "en" else "Passwort" }}</span><input type="password" name="password" required></label><button class="button primary">{{ "Sign in" if language == "en" else "Anmelden" }}</button></form></main></body></html>
